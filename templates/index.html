<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Based MBA Student Placement Prediction System</title>
    <link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>AI-Based MBA Student Placement Prediction System</h1>
    <p>Predict MBA Student Placement Using Machine Learning</p>

    <form action="/predict" method="POST">

        <div class="input-box">
            <label>SSC Percentage</label>
            <input type="number" name="ssc_percentage" min="0" max="100" step="0.01" required>
        </div>

        <div class="input-box">
            <label>HSC Percentage</label>
            <input type="number" name="hsc_percentage" min="0" max="100" step="0.01" required>
        </div>

        <div class="input-box">
            <label>Degree Percentage</label>
            <input type="number" name="degree_percentage" min="0" max="100" step="0.01" required>
        </div>

        <div class="input-box">
            <label>Employability Test Percentage</label>
            <input type="number" name="employability_test_percentage" min="0" max="100" step="0.01" required>
        </div>

        <div class="input-box">
            <label>MBA Percentage</label>
            <input type="number" name="mba_percentage" min="0" max="100" step="0.01" required>
        </div>

        <div class="input-box">
            <label>Gender</label>
            <select name="gender">
                <option value="M">Male</option>
                <option value="F">Female</option>
            </select>
        </div>

        <div class="input-box">
            <label>SSC Board</label>
            <select name="ssc_board">
                <option value="Central">Central</option>
                <option value="Others">Others</option>
            </select>
        </div>

        <div class="input-box">
            <label>HSC Board</label>
            <select name="hsc_board">
                <option value="Central">Central</option>
                <option value="Others">Others</option>
            </select>
        </div>

        <div class="input-box">
            <label>HSC Stream</label>
            <select name="hsc_stream">
                <option value="Science">Science</option>
                <option value="Commerce">Commerce</option>
                <option value="Arts">Arts</option>
            </select>
        </div>

        <div class="input-box">
            <label>Degree Type</label>
            <select name="degree_type">
                <option value="Sci&Tech">Science & Technology</option>
                <option value="Comm&Mgmt">Commerce & Management</option>
                <option value="Others">Others</option>
            </select>
        </div>

        <div class="input-box">
            <label>Work Experience</label>
            <select name="work_experience">
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>
        </div>

        <div class="input-box">
            <label>Specialisation</label>
            <select name="specialisation">
                <option value="Mkt&Fin">Marketing & Finance</option>
                <option value="Mkt&HR">Marketing & HR</option>
            </select>
        </div>

        <button type="submit">Predict Placement</button>

        <button type="reset">Clear</button>
        
    </form>

    {% if prediction %}
        <div class="result">
            <h2>{{ prediction }}</h2>
        </div>
    {% endif %}

    <hr>

    <p class="footer">
    AI-Based MBA Student Placement Prediction System
    </p>
    
</div>

</body>
</html>
